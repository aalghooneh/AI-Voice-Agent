<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Voice Agent</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #06030f;
      overflow: hidden;
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: #e0d8ff;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    #canvas-container {
      position: fixed;
      inset: 0;
      z-index: 0;
    }

    #ui {
      position: relative;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 28px;
      pointer-events: none;
      width: 100%;
      padding: 0 24px;
    }

    #orb-area {
      width: 280px;
      height: 280px;
    }

    #status-pill {
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      backdrop-filter: blur(12px);
      border-radius: 999px;
      padding: 6px 18px;
      font-size: 13px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      transition: all 0.4s ease;
    }

    #status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #7c6af7;
      transition: background 0.4s ease;
    }

    #status-dot.listening { background: #34d399; animation: pulse-dot 1s infinite; }
    #status-dot.thinking  { background: #fbbf24; animation: spin-hue 1.5s linear infinite; }
    #status-dot.speaking  { background: #60a5fa; animation: pulse-dot 0.5s infinite; }
    #status-dot.error     { background: #f87171; }

    @keyframes pulse-dot {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.5; transform: scale(1.4); }
    }
    @keyframes spin-hue {
      from { filter: hue-rotate(0deg); }
      to   { filter: hue-rotate(360deg); }
    }

    #transcript {
      max-width: 520px;
      text-align: center;
      min-height: 64px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #transcript-text {
      font-size: 16px;
      line-height: 1.6;
      color: rgba(220, 210, 255, 0.85);
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 14px 22px;
      backdrop-filter: blur(8px);
      transition: opacity 0.3s ease;
      max-width: 100%;
    }

    #transcript-text.fade { opacity: 0; }

    #title {
      position: fixed;
      top: 28px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 13px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(180,160,255,0.4);
      z-index: 20;
    }

    #reconnect-notice {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 12px;
      color: rgba(255,100,100,0.6);
      display: none;
      z-index: 20;
    }
  </style>
</head>
<body>

<div id="canvas-container"></div>

<p id="title">AI Voice Agent</p>

<div id="ui">
  <div id="orb-area"></div>

  <div id="status-pill">
    <div id="status-dot"></div>
    <span id="status-label">Initializing</span>
  </div>

  <div id="transcript">
    <p id="transcript-text">Connecting to agent...</p>
  </div>
</div>

<div id="reconnect-notice">Connection lost — reconnecting…</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.134.0/examples/js/postprocessing/EffectComposer.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.134.0/examples/js/postprocessing/RenderPass.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.134.0/examples/js/postprocessing/UnrealBloomPass.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.134.0/examples/js/postprocessing/ShaderPass.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.134.0/examples/js/shaders/CopyShader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.134.0/examples/js/shaders/LuminosityHighPassShader.js"></script>

<script>
// ─── State machine ──────────────────────────────────────────────────────────
const STATES = {
  idle:      { label: 'Idle',      colors: ['#4c1d95','#6d28d9','#7c3aed'], bloom: 0.6,  speed: 0.4,  amp: 0.18 },
  listening: { label: 'Listening', colors: ['#064e3b','#059669','#34d399'], bloom: 1.0,  speed: 0.9,  amp: 0.28 },
  thinking:  { label: 'Thinking',  colors: ['#78350f','#d97706','#fbbf24'], bloom: 0.9,  speed: 1.4,  amp: 0.35 },
  speaking:  { label: 'Speaking',  colors: ['#1e3a8a','#3b82f6','#a78bfa'], bloom: 1.4,  speed: 1.8,  amp: 0.55 },
  error:     { label: 'Error',     colors: ['#7f1d1d','#dc2626','#f87171'], bloom: 0.7,  speed: 0.5,  amp: 0.20 },
  user:      { label: 'You',       colors: ['#064e3b','#059669','#34d399'], bloom: 1.0,  speed: 0.9,  amp: 0.28 },
};

let currentState = 'idle';
let lerpT = 1.0;

function lerp(a, b, t) { return a + (b - a) * t; }
function hexToRgb(hex) {
  const r = parseInt(hex.slice(1,3),16)/255;
  const g = parseInt(hex.slice(3,5),16)/255;
  const b = parseInt(hex.slice(5,7),16)/255;
  return new THREE.Color(r,g,b);
}

// ─── Three.js setup ─────────────────────────────────────────────────────────
const container = document.getElementById('canvas-container');
const W = window.innerWidth, H = window.innerHeight;

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(W, H);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
container.appendChild(renderer.domElement);

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(50, W / H, 0.1, 100);
camera.position.z = 3.2;

// ─── Post-processing ─────────────────────────────────────────────────────────
const composer = new THREE.EffectComposer(renderer);
composer.addPass(new THREE.RenderPass(scene, camera));
const bloomPass = new THREE.UnrealBloomPass(
  new THREE.Vector2(W, H), 0.8, 0.7, 0.12
);
composer.addPass(bloomPass);

// ─── Simplex noise GLSL ──────────────────────────────────────────────────────
const noiseGLSL = /* glsl */`
vec3 mod289(vec3 x){return x-floor(x*(1./289.))*289.;}
vec4 mod289(vec4 x){return x-floor(x*(1./289.))*289.;}
vec4 permute(vec4 x){return mod289(((x*34.)+1.)*x);}
vec4 taylorInvSqrt(vec4 r){return 1.7928429-.8537347*r;}
float snoise(vec3 v){
  const vec2 C=vec2(1./6.,1./3.);
  const vec4 D=vec4(0.,.5,1.,2.);
  vec3 i=floor(v+dot(v,C.yyy));
  vec3 x0=v-i+dot(i,C.xxx);
  vec3 g=step(x0.yzx,x0.xyz);
  vec3 l=1.-g;
  vec3 i1=min(g.xyz,l.zxy);
  vec3 i2=max(g.xyz,l.zxy);
  vec3 x1=x0-i1+C.xxx;
  vec3 x2=x0-i2+C.yyy;
  vec3 x3=x0-D.yyy;
  i=mod289(i);
  vec4 p=permute(permute(permute(
    i.z+vec4(0.,i1.z,i2.z,1.))
   +i.y+vec4(0.,i1.y,i2.y,1.))
   +i.x+vec4(0.,i1.x,i2.x,1.));
  float n_=.142857142857;
  vec3 ns=n_*D.wyz-D.xzx;
  vec4 j=p-49.*floor(p*ns.z*ns.z);
  vec4 x_=floor(j*ns.z);
  vec4 y_=floor(j-7.*x_);
  vec4 x=x_*ns.x+ns.yyyy;
  vec4 y=y_*ns.x+ns.yyyy;
  vec4 h=1.-abs(x)-abs(y);
  vec4 b0=vec4(x.xy,y.xy);
  vec4 b1=vec4(x.zw,y.zw);
  vec4 s0=floor(b0)*2.+1.;
  vec4 s1=floor(b1)*2.+1.;
  vec4 sh=-step(h,vec4(0.));
  vec4 a0=b0.xzyw+s0.xzyw*sh.xxyy;
  vec4 a1=b1.xzyw+s1.xzyw*sh.zzww;
  vec3 p0=vec3(a0.xy,h.x);
  vec3 p1=vec3(a0.zw,h.y);
  vec3 p2=vec3(a1.xy,h.z);
  vec3 p3=vec3(a1.zw,h.w);
  vec4 norm=taylorInvSqrt(vec4(dot(p0,p0),dot(p1,p1),dot(p2,p2),dot(p3,p3)));
  p0*=norm.x; p1*=norm.y; p2*=norm.z; p3*=norm.w;
  vec4 m=max(.6-vec4(dot(x0,x0),dot(x1,x1),dot(x2,x2),dot(x3,x3)),0.);
  m=m*m;
  return 42.*dot(m*m,vec4(dot(p0,x0),dot(p1,x1),dot(p2,x2),dot(p3,x3)));
}`;

// ─── Orb shader material ─────────────────────────────────────────────────────
const orbMaterial = new THREE.ShaderMaterial({
  uniforms: {
    uTime:      { value: 0 },
    uAmplitude: { value: 0.18 },
    uSpeed:     { value: 0.4 },
    uColorA:    { value: hexToRgb('#4c1d95') },
    uColorB:    { value: hexToRgb('#6d28d9') },
    uColorC:    { value: hexToRgb('#7c3aed') },
  },
  vertexShader: /* glsl */`
    ${noiseGLSL}
    uniform float uTime;
    uniform float uAmplitude;
    uniform float uSpeed;
    varying vec3 vNormal;
    varying vec3 vPosition;

    void main() {
      vNormal = normalize(normalMatrix * normal);
      vec3 p = position;
      float t = uTime * uSpeed;
      float n  = snoise(p * 2.2 + vec3(t * 0.7, t * 0.5, t * 0.3));
      float n2 = snoise(p * 4.5 + vec3(-t * 0.4, t * 0.6, t * 0.8)) * 0.5;
      float n3 = snoise(p * 8.0 + vec3(t * 0.9, -t * 0.3, t * 0.5)) * 0.25;
      float displacement = (n + n2 + n3) * uAmplitude;
      p += normal * displacement;
      vPosition = p;
      gl_Position = projectionMatrix * modelViewMatrix * vec4(p, 1.0);
    }
  `,
  fragmentShader: /* glsl */`
    uniform float uTime;
    uniform vec3 uColorA;
    uniform vec3 uColorB;
    uniform vec3 uColorC;
    varying vec3 vNormal;
    varying vec3 vPosition;

    void main() {
      vec3 viewDir = normalize(cameraPosition - vPosition);
      float fresnel = pow(1.0 - clamp(dot(vNormal, viewDir), 0.0, 1.0), 2.5);

      float t  = sin(uTime * 0.6) * 0.5 + 0.5;
      float t2 = sin(uTime * 0.4 + 1.57) * 0.5 + 0.5;
      vec3 baseColor = mix(uColorA, uColorB, t);
      baseColor = mix(baseColor, uColorC, t2 * 0.6);

      vec3 iridColor = mix(uColorC, vec3(1.0, 0.85, 1.0), fresnel);
      vec3 color = mix(baseColor, iridColor, fresnel * 0.7);

      float alpha = 0.88 + fresnel * 0.12;
      gl_FragColor = vec4(color, alpha);
    }
  `,
  transparent: true,
  side: THREE.FrontSide,
});

const orbGeo = new THREE.SphereGeometry(1, 128, 128);
const orb = new THREE.Mesh(orbGeo, orbMaterial);
scene.add(orb);

// ─── Inner glow sphere ────────────────────────────────────────────────────────
const glowMat = new THREE.ShaderMaterial({
  uniforms: {
    uColorA: orbMaterial.uniforms.uColorA,
    uColorB: orbMaterial.uniforms.uColorB,
    uTime:   orbMaterial.uniforms.uTime,
  },
  vertexShader: `varying vec3 vNormal; void main(){ vNormal=normalize(normalMatrix*normal); gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.); }`,
  fragmentShader: `
    uniform vec3 uColorA;
    uniform vec3 uColorB;
    uniform float uTime;
    varying vec3 vNormal;
    void main(){
      vec3 viewDir=normalize(cameraPosition-vec3(0));
      float f=pow(1.-clamp(dot(vNormal,viewDir),0.,1.),1.8);
      vec3 c=mix(uColorA,uColorB,f);
      gl_FragColor=vec4(c,f*0.55);
    }`,
  transparent: true,
  side: THREE.BackSide,
  blending: THREE.AdditiveBlending,
  depthWrite: false,
});
const glowMesh = new THREE.Mesh(new THREE.SphereGeometry(1.28, 32, 32), glowMat);
scene.add(glowMesh);

// ─── Ground shade ─────────────────────────────────────────────────────────────
const shadeMat = new THREE.ShaderMaterial({
  uniforms: {
    uColor:   { value: hexToRgb('#4c1d95') },
    uOpacity: { value: 0.5 },
  },
  vertexShader: `
    varying vec2 vUv;
    void main() {
      vUv = uv;
      gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
    }
  `,
  fragmentShader: `
    uniform vec3 uColor;
    uniform float uOpacity;
    varying vec2 vUv;
    void main() {
      float d = length(vUv - 0.5) * 2.0;
      float alpha = pow(max(1.0 - d, 0.0), 1.4) * uOpacity;
      gl_FragColor = vec4(uColor, alpha);
    }
  `,
  transparent: true,
  side: THREE.DoubleSide,
  blending: THREE.AdditiveBlending,
  depthWrite: false,
});
const shadeGeo = new THREE.CircleGeometry(4.2, 64);
const shadeMesh = new THREE.Mesh(shadeGeo, shadeMat);
shadeMesh.rotation.x = -Math.PI / 2;
shadeMesh.position.y = -1.25;
scene.add(shadeMesh);

// ─── Floating particles — thin ethereal cloud ─────────────────────────────────
const PARTICLE_COUNT = 220;
const pPositions  = new Float32Array(PARTICLE_COUNT * 3);
const pVelocities = [];
for (let i = 0; i < PARTICLE_COUNT; i++) {
  const r     = 2.0 + Math.random() * 2.6;
  const theta = Math.random() * Math.PI * 2;
  const phi   = Math.acos(2 * Math.random() - 1);
  pPositions[i*3]   = r * Math.sin(phi) * Math.cos(theta);
  pPositions[i*3+1] = r * Math.sin(phi) * Math.sin(theta);
  pPositions[i*3+2] = r * Math.cos(phi);
  pVelocities.push({
    theta: Math.random() * 0.003 + 0.001,
    phi:   (Math.random() - 0.5) * 0.002,
    r:     2.0 + Math.random() * 2.6,
  });
}
const pGeo = new THREE.BufferGeometry();
pGeo.setAttribute('position', new THREE.BufferAttribute(pPositions, 3));
const pMat = new THREE.PointsMaterial({
  color: 0x9d78ff,
  size: 0.016,
  transparent: true,
  opacity: 0.10,
  blending: THREE.AdditiveBlending,
  depthWrite: false,
});
const particles = new THREE.Points(pGeo, pMat);
scene.add(particles);

const pAngles = new Float32Array(PARTICLE_COUNT * 2);
for (let i = 0; i < PARTICLE_COUNT; i++) {
  pAngles[i*2]   = Math.random() * Math.PI * 2;
  pAngles[i*2+1] = Math.acos(2 * Math.random() - 1);
}

// ─── State interpolation ──────────────────────────────────────────────────────
let currentUniforms = {
  amp: 0.18, speed: 0.4, bloom: 0.6,
  cA: hexToRgb('#4c1d95'), cB: hexToRgb('#6d28d9'), cC: hexToRgb('#7c3aed'),
};
let targetUniforms = { ...currentUniforms };

function applyState(stateName) {
  const s = STATES[stateName] || STATES.idle;
  targetUniforms = {
    amp:   s.amp,
    speed: s.speed,
    bloom: s.bloom,
    cA:    hexToRgb(s.colors[0]),
    cB:    hexToRgb(s.colors[1]),
    cC:    hexToRgb(s.colors[2]),
  };
}

// ─── Speech syllable engine ───────────────────────────────────────────────────
// Simulates a speech amplitude envelope — drives orb scale, bloom, and shade.
let speechEnvelope = 0;   // smoothed 0-1 output
let syllableValue   = 0;  // current raw syllable target
let syllableTimer   = 0;  // seconds until next syllable event
let pauseTimer      = 0;  // seconds of word-boundary silence remaining

function tickSpeech(dt) {
  if (currentState !== 'speaking') {
    speechEnvelope = lerp(speechEnvelope, 0, 0.07);
    return;
  }

  pauseTimer     -= dt;
  syllableTimer  -= dt;

  if (pauseTimer > 0) {
    // Brief word-boundary pause — amplitude falls
    syllableValue = lerp(syllableValue, 0, 1 - Math.pow(0.005, dt));
  } else if (syllableTimer <= 0) {
    // Decide next event
    if (Math.random() < 0.14) {
      // Word-boundary pause (80-220 ms)
      pauseTimer    = 0.08 + Math.random() * 0.14;
      syllableValue = 0;
    } else {
      // New syllable: stressed ones are louder & longer
      const stressed    = Math.random() < 0.35;
      syllableValue     = stressed ? 0.65 + Math.random() * 0.35 : 0.30 + Math.random() * 0.45;
      syllableTimer     = stressed ? 0.07 + Math.random() * 0.10 : 0.04 + Math.random() * 0.07;
    }
  } else {
    // Decay within the syllable
    syllableValue = lerp(syllableValue, syllableValue * 0.88, dt * 8);
  }

  speechEnvelope = lerp(speechEnvelope, syllableValue, 0.28);
}

// ─── Animation loop ───────────────────────────────────────────────────────────
const clock = new THREE.Clock();
let prevTime = 0;

function animate() {
  requestAnimationFrame(animate);
  const elapsed = clock.getElapsedTime();
  const dt      = Math.min(elapsed - prevTime, 0.05);
  prevTime      = elapsed;

  // Lerp uniforms toward target
  lerpT = Math.min(lerpT + dt * 2.5, 1.0);
  const ease = 1 - Math.pow(1 - lerpT, 3);

  currentUniforms.amp   = lerp(currentUniforms.amp,   targetUniforms.amp,   ease);
  currentUniforms.speed = lerp(currentUniforms.speed, targetUniforms.speed, ease);
  currentUniforms.bloom = lerp(currentUniforms.bloom, targetUniforms.bloom, ease);
  currentUniforms.cA.lerp(targetUniforms.cA, ease * 0.08);
  currentUniforms.cB.lerp(targetUniforms.cB, ease * 0.08);
  currentUniforms.cC.lerp(targetUniforms.cC, ease * 0.08);

  // Advance speech engine
  tickSpeech(dt);

  // Orb scale breathes with speech
  const targetScale = 1.0 + speechEnvelope * 0.14;
  orb.scale.setScalar(lerp(orb.scale.x, targetScale, 0.22));
  glowMesh.scale.setScalar(orb.scale.x);

  // Apply to orb material
  orbMaterial.uniforms.uTime.value      = elapsed;
  orbMaterial.uniforms.uAmplitude.value = currentUniforms.amp + speechEnvelope * 0.28;
  orbMaterial.uniforms.uSpeed.value     = currentUniforms.speed;
  orbMaterial.uniforms.uColorA.value.copy(currentUniforms.cA);
  orbMaterial.uniforms.uColorB.value.copy(currentUniforms.cB);
  orbMaterial.uniforms.uColorC.value.copy(currentUniforms.cC);

  // Bloom pulses with speech
  bloomPass.strength = currentUniforms.bloom + speechEnvelope * 0.75;

  // Ground shade — large, reacts to state color and speech
  shadeMat.uniforms.uColor.value.copy(currentUniforms.cB);
  shadeMat.uniforms.uOpacity.value = 0.38 + currentUniforms.amp * 0.25 + speechEnvelope * 0.32;

  // Gentle orb rotation
  orb.rotation.y = elapsed * 0.12 * currentUniforms.speed;
  orb.rotation.x = Math.sin(elapsed * 0.07) * 0.08;

  // Particle drift
  const pPos = pGeo.attributes.position.array;
  for (let i = 0; i < PARTICLE_COUNT; i++) {
    pAngles[i*2]   += pVelocities[i].theta * currentUniforms.speed * 0.5;
    pAngles[i*2+1] += pVelocities[i].phi   * currentUniforms.speed * 0.5;
    const r     = pVelocities[i].r;
    const theta = pAngles[i*2];
    const phi   = pAngles[i*2+1];
    pPos[i*3]   = r * Math.sin(phi) * Math.cos(theta);
    pPos[i*3+1] = r * Math.sin(phi) * Math.sin(theta);
    pPos[i*3+2] = r * Math.cos(phi);
  }
  pGeo.attributes.position.needsUpdate = true;
  pMat.color.copy(currentUniforms.cC);
  // Cloud stays very thin; only a whisper brighter during speech
  pMat.opacity = 0.07 + speechEnvelope * 0.06 + currentUniforms.amp * 0.05;

  composer.render();
}
animate();

// ─── Resize ───────────────────────────────────────────────────────────────────
window.addEventListener('resize', () => {
  const w = window.innerWidth, h = window.innerHeight;
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
  renderer.setSize(w, h);
  composer.setSize(w, h);
});

// ─── WebSocket ────────────────────────────────────────────────────────────────
const statusDot    = document.getElementById('status-dot');
const statusLabel  = document.getElementById('status-label');
const transcriptEl = document.getElementById('transcript-text');
const reconnectEl  = document.getElementById('reconnect-notice');

function setTranscript(text) {
  if (!text) return;
  transcriptEl.classList.add('fade');
  setTimeout(() => {
    transcriptEl.textContent = text;
    transcriptEl.classList.remove('fade');
  }, 200);
}

function handleState(state, text) {
  currentState = state;
  lerpT = 0;
  applyState(state);

  const s = STATES[state] || STATES.idle;
  statusLabel.textContent = s.label;
  statusDot.className = '';
  statusDot.classList.add(state);

  if (state === 'user')      setTranscript('You: ' + text);
  if (state === 'speaking')  setTranscript('Agent: ' + text);
  if (state === 'error')     setTranscript('Error: ' + text);
  if (state === 'idle')      setTranscript('Say something...');
  if (state === 'listening') setTranscript('Listening...');
  if (state === 'thinking')  setTranscript('Thinking...');
}

let ws;
let reconnectDelay = 2000;
let reconnectScheduled = false;

function scheduleReconnect() {
  if (reconnectScheduled) return;
  reconnectScheduled = true;
  reconnectEl.style.display = 'block';
  handleState('idle');
  setTimeout(() => {
    reconnectScheduled = false;
    connectWS();
  }, reconnectDelay);
  reconnectDelay = Math.min(reconnectDelay * 2, 15000);
}

function connectWS() {
  const protocol = location.protocol === 'https:' ? 'wss' : 'ws';
  const host = ['0.0.0.0', ''].includes(location.hostname) ? 'localhost' : location.hostname;
  const port = location.port ? `:${location.port}` : '';
  ws = new WebSocket(`${protocol}://${host}${port}/ws`);

  ws.onopen = () => {
    reconnectEl.style.display = 'none';
    reconnectDelay = 2000;
    handleState('idle');
  };

  ws.onmessage = (ev) => {
    try {
      const msg = JSON.parse(ev.data);
      handleState(msg.state, msg.text || '');
    } catch(e) {}
  };

  ws.onerror = () => {};
  ws.onclose = () => scheduleReconnect();
}

connectWS();
</script>
</body>
</html>
