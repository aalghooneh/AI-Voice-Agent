<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Voice Agent</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #080810;
      overflow: hidden;
      font-family: -apple-system, 'Segoe UI', sans-serif;
      color: #c8c0e8;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ── Centered stage: orb + history side by side ─────────── */
    #stage {
      display: flex;
      align-items: center;
      gap: 36px;
    }

    /* ── Orb column ──────────────────────────────────────────── */
    #orb-col {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      flex-shrink: 0;
    }

    #orb-wrapper {
      width: 280px;
      height: 280px;
      border-radius: 50%;
      overflow: hidden;
      box-shadow:
        0 0 40px 4px rgba(100,80,220,0.35),
        0 0 80px 8px rgba(100,80,220,0.12);
      transition: box-shadow 0.9s ease;
    }
    #orb-wrapper canvas {
      display: block;
      width: 280px !important;
      height: 280px !important;
    }

    #status-pill {
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.09);
      border-radius: 999px;
      padding: 6px 18px;
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: rgba(200,190,240,0.6);
    }
    #status-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: rgba(120,100,220,0.8);
    }
    #status-dot.listening { background:#34d399; animation: blink 1.2s ease infinite; }
    #status-dot.thinking  { background:#fbbf24; animation: hue   1.4s linear  infinite; }
    #status-dot.speaking  { background:#60a5fa; animation: blink 0.5s ease infinite; }
    #status-dot.error     { background:#f87171; }

    @keyframes blink {
      0%,100%{ opacity:1; transform:scale(1);   }
      50%    { opacity:.4; transform:scale(1.5); }
    }
    @keyframes hue {
      from{ filter:hue-rotate(0deg); }
      to  { filter:hue-rotate(360deg); }
    }

    #live-transcript {
      font-size: 12px;
      color: rgba(200,185,255,0.4);
      text-align: center;
      max-width: 280px;
      min-height: 18px;
      transition: opacity 0.25s;
    }
    #live-transcript.fade { opacity: 0; }

    /* ── History column ──────────────────────────────────────── */
    #history-panel {
      width: 280px;
      height: 360px;
      display: flex;
      flex-direction: column;
      position: relative;
      mask-image: linear-gradient(to bottom, transparent 0%, black 10%, black 90%, transparent 100%);
      -webkit-mask-image: linear-gradient(to bottom, transparent 0%, black 10%, black 90%, transparent 100%);
    }

    #history-scroll {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      padding: 16px 4px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      scrollbar-width: none;
    }
    #history-scroll::-webkit-scrollbar { display: none; }

    /* ── Messages ────────────────────────────────────────────── */
    .msg {
      display: flex;
      flex-direction: column;
      gap: 3px;
      animation: fadeUp 0.25s ease;
    }
    @keyframes fadeUp {
      from { opacity:0; transform:translateY(5px); }
      to   { opacity:1; transform:translateY(0);   }
    }

    .msg-label {
      font-size: 9px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      opacity: 0.35;
      padding: 0 2px;
    }
    .msg.user  .msg-label { color: #34d399; }
    .msg.ai    .msg-label { color: #60a5fa; }
    .msg.think .msg-label { color: #fbbf24; }

    .msg-bubble {
      padding: 0 2px;
      font-size: 13px;
      line-height: 1.65;
      background: rgba(255,255,255,0.03);
      border-radius: 6px;
      word-break: break-word;
    }
    /* only font color differs — no borders, same bg */
    .msg.user  .msg-bubble { color: rgba(160,240,200,0.75); }
    .msg.ai    .msg-bubble { color: rgba(185,215,255,0.75); }
    .msg.think .msg-bubble { color: rgba(255,210,100,0.5); font-style: italic; }

    .think-dots::after {
      content: '';
      animation: dots 1.4s steps(4, end) infinite;
    }
    @keyframes dots {
      0%  { content: ''; }
      25% { content: '.'; }
      50% { content: '..'; }
      75% { content: '...'; }
    }

    #title {
      position: fixed;
      top: 22px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 10px;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: rgba(160,140,220,0.2);
    }

    #reconnect-notice {
      position: fixed;
      bottom: 18px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 11px;
      color: rgba(248,113,113,0.5);
      display: none;
    }
  </style>
</head>
<body>

<p id="title">AI Voice Agent</p>

<div id="stage">
  <!-- orb -->
  <div id="orb-col">
    <div id="orb-wrapper"></div>
    <div id="status-pill">
      <div id="status-dot"></div>
      <span id="status-label">Connecting</span>
    </div>
    <p id="live-transcript">Connecting…</p>
  </div>

  <!-- history -->
  <div id="history-panel">
    <div id="history-scroll"></div>
  </div>
</div>

<div id="reconnect-notice">Connection lost — reconnecting…</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
<script>
// ── State config ──────────────────────────────────────────────────────────────
const STATES = {
  idle:      { label:'Idle',      glow:'rgba(80,60,180,0.3)',  ca:'#0d0a2e', cb:'#1a0a4a', cc:'#2d1080', speed:0.4, amp:0.12, waveAmp:0.3  },
  listening: { label:'Listening', glow:'rgba(30,180,120,0.4)', ca:'#001a12', cb:'#003d28', cc:'#00a86b', speed:0.8, amp:0.20, waveAmp:0.5  },
  thinking:  { label:'Thinking',  glow:'rgba(220,160,30,0.4)', ca:'#1a0d00', cb:'#3d1f00', cc:'#c07010', speed:1.4, amp:0.28, waveAmp:0.65 },
  speaking:  { label:'Speaking',  glow:'rgba(50,130,255,0.5)', ca:'#000d2e', cb:'#001a6e', cc:'#4080ff', speed:2.2, amp:0.45, waveAmp:1.0  },
  error:     { label:'Error',     glow:'rgba(220,50,50,0.35)', ca:'#1a0000', cb:'#3d0000', cc:'#c02020', speed:0.5, amp:0.15, waveAmp:0.3  },
  user:      { label:'You',       glow:'rgba(30,180,120,0.4)', ca:'#001a12', cb:'#003d28', cc:'#00a86b', speed:0.8, amp:0.20, waveAmp:0.5  },
};

let currentState = 'idle';
function lerp(a,b,t){ return a+(b-a)*t; }
function hex2rgb(h){ return [parseInt(h.slice(1,3),16)/255, parseInt(h.slice(3,5),16)/255, parseInt(h.slice(5,7),16)/255]; }

// ── Three.js orb ─────────────────────────────────────────────────────────────
const SIZE = 280;
const wrapper = document.getElementById('orb-wrapper');
const renderer = new THREE.WebGLRenderer({ antialias:true, alpha:false });
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
renderer.setSize(SIZE, SIZE);
wrapper.appendChild(renderer.domElement);
const scene  = new THREE.Scene();
const camera = new THREE.OrthographicCamera(-1,1,1,-1,0,1);

const NOISE = `
vec3 mod289v3(vec3 x){return x-floor(x*(1./289.))*289.;}
vec4 mod289v4(vec4 x){return x-floor(x*(1./289.))*289.;}
vec4 permute(vec4 x){return mod289v4(((x*34.)+1.)*x);}
vec4 taylorInvSqrt(vec4 r){return 1.7928429-.8537347*r;}
float snoise(vec3 v){
  const vec2 C=vec2(1./6.,1./3.);const vec4 D=vec4(0.,.5,1.,2.);
  vec3 i=floor(v+dot(v,C.yyy));vec3 x0=v-i+dot(i,C.xxx);
  vec3 g=step(x0.yzx,x0.xyz);vec3 l=1.-g;
  vec3 i1=min(g.xyz,l.zxy);vec3 i2=max(g.xyz,l.zxy);
  vec3 x1=x0-i1+C.xxx;vec3 x2=x0-i2+C.yyy;vec3 x3=x0-D.yyy;
  i=mod289v3(i);
  vec4 p=permute(permute(permute(i.z+vec4(0.,i1.z,i2.z,1.))+i.y+vec4(0.,i1.y,i2.y,1.))+i.x+vec4(0.,i1.x,i2.x,1.));
  float n_=.142857142857;vec3 ns=n_*D.wyz-D.xzx;
  vec4 j=p-49.*floor(p*ns.z*ns.z);vec4 x_=floor(j*ns.z);vec4 y_=floor(j-7.*x_);
  vec4 x=x_*ns.x+ns.yyyy;vec4 y=y_*ns.x+ns.yyyy;vec4 h=1.-abs(x)-abs(y);
  vec4 b0=vec4(x.xy,y.xy);vec4 b1=vec4(x.zw,y.zw);
  vec4 s0=floor(b0)*2.+1.;vec4 s1=floor(b1)*2.+1.;vec4 sh=-step(h,vec4(0.));
  vec4 a0=b0.xzyw+s0.xzyw*sh.xxyy;vec4 a1=b1.xzyw+s1.xzyw*sh.zzww;
  vec3 p0=vec3(a0.xy,h.x);vec3 p1=vec3(a0.zw,h.y);vec3 p2=vec3(a1.xy,h.z);vec3 p3=vec3(a1.zw,h.w);
  vec4 norm=taylorInvSqrt(vec4(dot(p0,p0),dot(p1,p1),dot(p2,p2),dot(p3,p3)));
  p0*=norm.x;p1*=norm.y;p2*=norm.z;p3*=norm.w;
  vec4 m=max(.6-vec4(dot(x0,x0),dot(x1,x1),dot(x2,x2),dot(x3,x3)),0.);m=m*m;
  return 42.*dot(m*m,vec4(dot(p0,x0),dot(p1,x1),dot(p2,x2),dot(p3,x3)));
}`;

const fluidMat = new THREE.ShaderMaterial({
  uniforms: {
    uTime:{ value:0 }, uSpeed:{ value:0.4 }, uAmp:{ value:0.12 }, uWaveAmp:{ value:0.3 },
    uColorA:{ value:new THREE.Vector3(...hex2rgb('#0d0a2e')) },
    uColorB:{ value:new THREE.Vector3(...hex2rgb('#1a0a4a')) },
    uColorC:{ value:new THREE.Vector3(...hex2rgb('#2d1080')) },
  },
  vertexShader:`varying vec2 vUv; void main(){ vUv=uv; gl_Position=vec4(position,1.); }`,
  fragmentShader:`
    ${NOISE}
    uniform float uTime,uSpeed,uAmp,uWaveAmp;
    uniform vec3 uColorA,uColorB,uColorC;
    varying vec2 vUv;
    void main(){
      vec2 uv=vUv; float t=uTime*uSpeed;
      vec2 cUv=uv-0.5; float dist=length(cUv);
      if(dist>0.5){ gl_FragColor=vec4(0.); return; }
      float n1=snoise(vec3(uv*3.0,t*0.6));
      float n2=snoise(vec3(uv*6.5,t*0.4+10.));
      float n3=snoise(vec3(uv*12.0,t*0.9+20.));
      float fluid=n1*0.55+n2*0.30+n3*0.15;
      float warpX=snoise(vec3(uv*4.0,t*0.5))*0.15;
      float warpY=snoise(vec3(uv*4.0+5.,t*0.5))*0.15;
      float wave=sin((uv.y+warpY+warpX)*14.0-t*2.5)*0.5+0.5;
      wave=pow(wave,2.5)*uWaveAmp;
      float pattern=fluid*uAmp+wave*0.22;
      vec3 col=mix(uColorA,uColorB,clamp(pattern*2.0,0.,1.));
      col=mix(col,uColorC,clamp((pattern-0.3)*2.5,0.,1.));
      float core=1.0-smoothstep(0.0,0.45,dist);
      col=mix(col,uColorA*0.4,core*0.55);
      float edge=smoothstep(0.5,0.3,dist);
      float rim=1.0-smoothstep(0.46,0.50,dist);
      col+=uColorC*rim*0.35;
      gl_FragColor=vec4(col*edge,1.0);
    }`,
});
scene.add(new THREE.Mesh(new THREE.PlaneGeometry(2,2), fluidMat));

// particles
const P=180, pPos=new Float32Array(P*3), pSpd=new Float32Array(P), pRad=new Float32Array(P), pAng=new Float32Array(P);
for(let i=0;i<P;i++){
  const r=Math.random()*0.44, a=Math.random()*Math.PI*2;
  pRad[i]=r; pAng[i]=a; pSpd[i]=(Math.random()-0.5)*0.008;
  pPos[i*3]=Math.cos(a)*r; pPos[i*3+1]=Math.sin(a)*r;
}
const pGeo=new THREE.BufferGeometry();
pGeo.setAttribute('position',new THREE.BufferAttribute(pPos,3));
const pMat=new THREE.ShaderMaterial({
  uniforms:{ uColor:{ value:new THREE.Vector3(...hex2rgb('#4080ff')) } },
  vertexShader:`void main(){ gl_PointSize=2.0; gl_Position=vec4(position*2.0,1.0); }`,
  fragmentShader:`uniform vec3 uColor; void main(){ float d=length(gl_PointCoord-0.5)*2.0; if(d>1.0)discard; gl_FragColor=vec4(uColor,(1.0-d)*0.7); }`,
  transparent:true, blending:THREE.AdditiveBlending, depthWrite:false,
});
scene.add(new THREE.Points(pGeo,pMat));

// lerp state
const cur={ speed:.4, amp:.12, waveAmp:.3, ca:hex2rgb('#0d0a2e'), cb:hex2rgb('#1a0a4a'), cc:hex2rgb('#2d1080') };
const tgt={ ...cur, ca:[...cur.ca], cb:[...cur.cb], cc:[...cur.cc] };
let lerpT=1;
function applyState(name){
  const s=STATES[name]||STATES.idle;
  tgt.speed=s.speed; tgt.amp=s.amp; tgt.waveAmp=s.waveAmp;
  tgt.ca=hex2rgb(s.ca); tgt.cb=hex2rgb(s.cb); tgt.cc=hex2rgb(s.cc);
  lerpT=0;
  wrapper.style.boxShadow=`0 0 40px 4px ${s.glow},0 0 80px 10px ${s.glow.replace(/[\d.]+\)$/,'0.08)')}`;
}

let speakPhase=0, speakBump=0;
const clock=new THREE.Clock();
function animate(){
  requestAnimationFrame(animate);
  const t=clock.getElapsedTime();
  lerpT=Math.min(lerpT+0.032,1);
  const e=1-Math.pow(1-lerpT,3);
  cur.speed=lerp(cur.speed,tgt.speed,e*0.06);
  cur.amp=lerp(cur.amp,tgt.amp,e*0.06);
  cur.waveAmp=lerp(cur.waveAmp,tgt.waveAmp,e*0.06);
  cur.ca=cur.ca.map((v,i)=>lerp(v,tgt.ca[i],e*0.04));
  cur.cb=cur.cb.map((v,i)=>lerp(v,tgt.cb[i],e*0.04));
  cur.cc=cur.cc.map((v,i)=>lerp(v,tgt.cc[i],e*0.04));
  if(currentState==='speaking'){ speakPhase+=0.09; speakBump=lerp(speakBump,0.12+Math.abs(Math.sin(speakPhase*3.1))*0.2,0.14); }
  else speakBump=lerp(speakBump,0,0.07);
  fluidMat.uniforms.uTime.value=t;
  fluidMat.uniforms.uSpeed.value=cur.speed;
  fluidMat.uniforms.uAmp.value=cur.amp+speakBump;
  fluidMat.uniforms.uWaveAmp.value=cur.waveAmp+speakBump*1.5;
  fluidMat.uniforms.uColorA.value.set(...cur.ca);
  fluidMat.uniforms.uColorB.value.set(...cur.cb);
  fluidMat.uniforms.uColorC.value.set(...cur.cc);
  for(let i=0;i<P;i++){
    pAng[i]+=pSpd[i]*cur.speed;
    const r=pRad[i]+Math.sin(t*0.7+i*0.37)*0.04;
    pPos[i*3]=Math.cos(pAng[i])*r; pPos[i*3+1]=Math.sin(pAng[i])*r;
  }
  pGeo.attributes.position.needsUpdate=true;
  pMat.uniforms.uColor.value.set(...cur.cc);
  renderer.render(scene,camera);
}
animate();

// ── History panel ─────────────────────────────────────────────────────────────
const historyScroll = document.getElementById('history-scroll');
let thinkingEl  = null;   // the current thinking bubble
let currentAiEl = null;   // the current AI bubble being built

function scrollHistory(){
  historyScroll.scrollTo({ top: historyScroll.scrollHeight, behavior: 'smooth' });
}

function addBubble(role, labelText, bodyText, extraClass=''){
  const wrap = document.createElement('div');
  wrap.className = `msg ${role}`;

  const label = document.createElement('div');
  label.className = 'msg-label';
  label.textContent = labelText;

  const bubble = document.createElement('div');
  bubble.className = `msg-bubble ${extraClass}`;
  bubble.textContent = bodyText;

  wrap.appendChild(label);
  wrap.appendChild(bubble);
  historyScroll.appendChild(wrap);
  scrollHistory();
  return bubble;
}

function addThinking(){
  if(thinkingEl) return;
  thinkingEl = addBubble('think', 'Thinking', '', 'think-dots');
}

function removeThinking(){
  if(thinkingEl){
    thinkingEl.closest('.msg').remove();
    thinkingEl = null;
  }
}

function appendAI(text){
  if(!currentAiEl){
    currentAiEl = addBubble('ai', 'Agent', text);
  } else {
    currentAiEl.textContent += ' ' + text;
    scrollHistory();
  }
}

// ── UI helpers ────────────────────────────────────────────────────────────────
const statusDot    = document.getElementById('status-dot');
const statusLabel  = document.getElementById('status-label');
const liveEl       = document.getElementById('live-transcript');
const reconnectEl  = document.getElementById('reconnect-notice');

function setLive(text){
  liveEl.classList.add('fade');
  setTimeout(()=>{ liveEl.textContent=text; liveEl.classList.remove('fade'); }, 200);
}

function handleState(state, text){
  currentState = state;
  applyState(state);
  const s = STATES[state] || STATES.idle;
  statusLabel.textContent = s.label;
  statusDot.className = state;

  if(state === 'user'){
    currentAiEl = null;                       // reset AI accumulator for next turn
    addBubble('user', 'You', text);
    setLive('');
  }
  if(state === 'thinking'){
    addThinking();
    setLive('Thinking…');
  }
  if(state === 'speaking'){
    removeThinking();
    appendAI(text);
    setLive(text);
  }
  if(state === 'listening'){
    currentAiEl = null;
    setLive('Listening…');
  }
  if(state === 'idle')  setLive('Say something…');
  if(state === 'error'){ setLive('Error: '+text); addBubble('think','Error',text); }
}

// ── WebSocket ─────────────────────────────────────────────────────────────────
let ws, reconnectDelay=2000, reconnectScheduled=false;
function scheduleReconnect(){
  if(reconnectScheduled) return;
  reconnectScheduled=true;
  reconnectEl.style.display='block';
  setTimeout(()=>{ reconnectScheduled=false; connectWS(); }, reconnectDelay);
  reconnectDelay=Math.min(reconnectDelay*2,15000);
}
function connectWS(){
  const proto=location.protocol==='https:'?'wss':'ws';
  const host=['0.0.0.0',''].includes(location.hostname)?'localhost':location.hostname;
  const port=location.port?`:${location.port}`:'';
  ws=new WebSocket(`${proto}://${host}${port}/ws`);
  ws.onopen=()=>{ reconnectEl.style.display='none'; reconnectDelay=2000; handleState('idle'); };
  ws.onmessage=(ev)=>{ try{ const m=JSON.parse(ev.data); handleState(m.state,m.text||''); }catch(e){} };
  ws.onerror=()=>{};
  ws.onclose=()=>scheduleReconnect();
}
connectWS();
</script>
</body>
</html>
